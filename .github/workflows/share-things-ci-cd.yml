name: ShareThings CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install root dependencies
      run: npm ci
    
    - name: Install client dependencies
      run: cd client && npm ci && npm install crypto-js @types/crypto-js
    
    - name: Install server dependencies
      run: cd server && npm ci
    
    - name: Lint server
      run: |
        echo "Running server lint with detailed output..."
        cd server && npm run lint -- --format stylish
    
    - name: Lint client
      run: |
        echo "Running client lint with detailed output..."
        cd client && npm run lint -- --format stylish

  build:
    name: Build and Test
    needs: [lint]
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install root dependencies
      run: npm ci
    
    - name: Install client dependencies
      run: cd client && npm ci && npm install crypto-js @types/crypto-js
    
    - name: Install server dependencies
      run: cd server && npm ci
    
    - name: Build server
      run: cd server && npm run build
    
    - name: Build client
      run: cd client && npm run build
    
    - name: Test server
      run: cd server && npm test
    
    - name: Test client
      run: cd client && npm test
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          server/dist
          client/dist

  integration:
    name: Dockered Build and Tests
    needs: [build]
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: sharethings_test
          POSTGRES_PASSWORD: sharethings_test
          POSTGRES_DB: sharethings_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Cache Docker layers
      uses: actions/cache@v3
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-
    
    - name: Make build-and-test script executable
      run: chmod +x build-and-test.sh
    
    - name: Debug environment
      run: |
        echo "GitHub Actions environment:"
        echo "Working directory: $(pwd)"
        ls -la
        echo "Docker version:"
        docker --version
        echo "Docker Compose version:"
        docker-compose --version || docker compose version
        echo "Docker info:"
        docker info
        echo "Available disk space:"
        df -h
    
    - name: Set PostgreSQL environment variables
      run: |
        echo "SESSION_STORAGE_TYPE=postgresql" >> server/.env
        echo "PG_HOST=localhost" >> server/.env
        echo "PG_PORT=5432" >> server/.env
        echo "PG_DATABASE=sharethings_test" >> server/.env
        echo "PG_USER=sharethings_test" >> server/.env
        echo "PG_PASSWORD=sharethings_test" >> server/.env
        echo "PG_SSL=false" >> server/.env
        echo "INTEGRATION_TESTS=true" >> server/.env
    
    - name: Build and run tests with verbose output
      run: bash -x ./build-and-test.sh
      env:
        CI: true
        DOCKER_BUILDKIT: 1
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: test-results/

  setup-tests:
    name: Setup Script Tests
    needs: [integration]
    runs-on: [self-hosted, Rocky Linux]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Make setup scripts executable
      run: |
        chmod +x setup.sh
        mkdir -p setup
        chmod +x setup/*.sh
    
    - name: Run setup tests with in-memory storage
      run: |
        # Clean up any existing containers
        podman ps -a --filter name=share-things | awk 'NR>1 {print $1}' | xargs -r podman rm -f
        
        # Run setup in test mode with in-memory storage
        ./setup.sh --test memory
        
        # Verify containers are running
        podman ps --filter name=share-things
        
        # Clean up
        podman ps -a --filter name=share-things | awk 'NR>1 {print $1}' | xargs -r podman rm -f
    
    - name: Run setup tests with PostgreSQL storage
      run: |
        # Clean up any existing containers
        podman ps -a --filter name=share-things | awk 'NR>1 {print $1}' | xargs -r podman rm -f
        
        # Run setup in test mode with PostgreSQL storage
        ./setup.sh --test postgres
        
        # Verify containers are running
        podman ps --filter name=share-things
        
        # Clean up
        podman ps -a --filter name=share-things | awk 'NR>1 {print $1}' | xargs -r podman rm -f

  build-production:
    name: Build Production
    needs: [setup-tests]
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Cache Docker layers
      uses: actions/cache@v3
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-
    
    - name: Make build-production script executable
      run: |
        chmod +x build-production.sh
    
    - name: Debug environment
      run: |
        echo "GitHub Actions environment:"
        echo "Working directory: $(pwd)"
        ls -la
        echo "Docker version:"
        docker --version
        echo "Docker Compose version:"
        docker-compose --version || docker compose version
        echo "Docker info:"
        docker info
    
    - name: Build production containers
      run: ./build-production.sh
      env:
        CI: true
        DOCKER_BUILDKIT: 1
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: production-build-artifacts
        path: |
          server/dist
          client/dist

  deploy-production:
    name: Deploy to Production
    needs: [build-production]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: [self-hosted, Rocky Linux]
    
    steps:
      - name: Deploy to production server
        # Use sshpass to handle password authentication
        run: |
          # Install sshpass if not already installed
          if ! command -v sshpass &> /dev/null; then
            sudo yum install -y sshpass
          fi
          
          # Function to check if update-server.sh is running
          check_update_script_running() {
            sshpass -p "${{ secrets.GHRUserPassword }}" ssh -o StrictHostKeyChecking=no ${{ secrets.GHRUserName }}@${{ secrets.DeploymentServerIP }} "pgrep -f update-server.sh" > /dev/null
            return $?
          }
          
          # Wait until any existing update-server.sh process completes
          echo "Checking if update-server.sh is already running on the production server..."
          while check_update_script_running; do
            echo "update-server.sh is currently running. Waiting 30 seconds before checking again..."
            sleep 30
          done
          
          echo "No running update-server.sh process detected. Proceeding with deployment..."
          
          # Set up SSH connection and run the update script, capturing the exit code
          sshpass -p "${{ secrets.GHRUserPassword }}" ssh -o StrictHostKeyChecking=no ${{ secrets.GHRUserName }}@${{ secrets.DeploymentServerIP }} "cd ~/share-things && ./update-server.sh"
          DEPLOY_EXIT_CODE=$?
          
          # Check if the deployment was successful
          if [ $DEPLOY_EXIT_CODE -ne 0 ]; then
            echo "Deployment failed with exit code $DEPLOY_EXIT_CODE"
            exit $DEPLOY_EXIT_CODE
          else
            echo "Deployment completed successfully"
          fi