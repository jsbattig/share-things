name: Rocky Linux Tests

on:
  push:
    branches:
      - main
      - feature/postgresql-session-management
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  rocky-linux-tests:
    name: Test Setup and Update on Rocky Linux
    runs-on: [self-hosted, Rocky Linux]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Make scripts executable
        run: |
          chmod +x setup.sh update-server.sh ci/rocky-linux/*.sh setup/*.sh
      
      - name: Display environment information
        run: |
          echo "OS Information:"
          cat /etc/os-release
          
          echo "Podman version:"
          podman --version
          
          echo "Podman-compose version:"
          podman-compose --version || echo "podman-compose not installed"
          
          echo "Current directory:"
          pwd
      
      # Instead of running setup.sh directly, we'll use the test-setup.sh script
      # This ensures we follow the same code path as the wrapper script
      - name: Test setup with memory storage
        run: |
          # Run the test-setup.sh script with the current branch and directory
          # This script handles both memory and PostgreSQL storage tests
          ./ci/rocky-linux/test-setup.sh feature/postgresql-session-management $(pwd)
      
      # The PostgreSQL storage test is already included in the test-setup.sh script
      # We don't need a separate step for it
      
      # Use the test-update.sh script instead of running update-server.sh directly
      - name: Test update script
        run: |
          # Run the test-update.sh script with the current branch and directory
          ./ci/rocky-linux/test-update.sh feature/postgresql-session-management $(pwd)