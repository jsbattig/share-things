name: Rocky Linux Tests

on:
  push:
    branches:
      - main
      - feature/postgresql-session-management
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  rocky-linux-tests:
    name: Test Setup and Update on Rocky Linux
    runs-on: [self-hosted, Rocky Linux]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Make scripts executable
        run: |
          chmod +x setup.sh update-server.sh ci/rocky-linux/*.sh setup/*.sh
      
      - name: Display environment information
        run: |
          echo "OS Information:"
          cat /etc/os-release
          
          echo "Podman version:"
          podman --version
          
          echo "Podman-compose version:"
          podman-compose --version || echo "podman-compose not installed"
          
          echo "Current directory:"
          pwd
      
      - name: Test setup with memory storage
        env:
          GITHUB_ACTIONS: true
          CI: true
        run: |
          # Run setup.sh with memory storage
          ./setup.sh --memory --container-engine podman --hostname auto --use-custom-ports y --frontend-port 15000 --backend-port 15001 --start
          
          # Check if containers are running
          echo "Checking containers status:"
          podman ps -a
          
          # Check container logs
          echo "Backend container logs:"
          podman logs share-things-backend || true
          
          echo "Frontend container logs:"
          podman logs share-things-frontend || true
          
          # Test backend health endpoint
          echo "Testing backend health endpoint:"
          curl -v http://localhost:15001/health || true
          
          # Test frontend
          echo "Testing frontend:"
          curl -s -I http://localhost:15000 || true
          
          # Clean up
          podman-compose down -v || true
          podman system reset --force || true
      
      - name: Test setup with PostgreSQL storage
        env:
          GITHUB_ACTIONS: true
          CI: true
        run: |
          # Run setup.sh with PostgreSQL storage
          ./setup.sh --postgresql --container-engine podman --hostname auto --use-custom-ports y --frontend-port 15000 --backend-port 15001 --start
          
          # Check if containers are running
          echo "Checking containers status:"
          podman ps -a
          
          # Check container logs
          echo "PostgreSQL container logs:"
          podman logs share-things-postgres || true
          
          echo "Backend container logs:"
          podman logs share-things-backend || true
          
          echo "Frontend container logs:"
          podman logs share-things-frontend || true
          
          # Test backend health endpoint
          echo "Testing backend health endpoint:"
          curl -v http://localhost:15001/health || true
          
          # Test frontend
          echo "Testing frontend:"
          curl -s -I http://localhost:15000 || true
          
          # Clean up
          podman-compose down -v || true
          podman system reset --force || true
      
      - name: Test update script
        env:
          GITHUB_ACTIONS: true
          CI: true
        run: |
          # Run setup.sh first
          ./setup.sh --memory --container-engine podman --hostname auto --use-custom-ports y --frontend-port 15000 --backend-port 15001 --start
          
          # Run update script
          ./update-server.sh
          
          # Check if containers are running after update
          echo "Checking containers status after update:"
          podman ps -a
          
          # Test backend health endpoint after update
          echo "Testing backend health endpoint after update:"
          curl -v http://localhost:15001/health || true
          
          # Clean up
          podman-compose down -v || true
          podman system reset --force || true