name: Rocky Linux Tests

on:
  push:
    branches:
      - main
      - feature/postgresql-session-management
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  rocky-linux-tests:
    name: Test Setup and Update on Rocky Linux
    runs-on: [self-hosted, Rocky Linux]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Make scripts executable
        run: |
          chmod +x setup.sh update-server.sh ci/rocky-linux/*.sh
      
      - name: Run the setup test script
        run: |
          ./ci/rocky-linux/test-setup.sh ${{ github.ref_name }} $(pwd)
      
      - name: Run the update test script
        run: |
          ./ci/rocky-linux/test-update.sh ${{ github.ref_name }} $(pwd) 15000