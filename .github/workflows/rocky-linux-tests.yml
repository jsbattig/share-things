name: Rocky Linux Tests

on:
  push:
    branches:
      - main
      - feature/postgresql-session-management
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  rocky-linux-tests:
    name: Test Setup and Update on Rocky Linux
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up test environment
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass
          mkdir -p ~/.ssh
          echo "${{ secrets.ROCKY_LINUX_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.ROCKY_LINUX_HOST }} >> ~/.ssh/known_hosts
      
      - name: Create wrapper script
        run: |
          cat > rocky-linux-wrapper.sh << 'EOL'
          #!/bin/bash
          
          # Rocky Linux Wrapper Script for ShareThings Testing
          # This script is generated by GitHub Actions
          
          # Colors for output
          GREEN='\033[0;32m'
          BLUE='\033[0;34m'
          YELLOW='\033[1;33m'
          RED='\033[0;31m'
          NC='\033[0m' # No Color
          
          # Configuration with secrets from GitHub Actions
          REMOTE_HOST="${{ secrets.ROCKY_LINUX_HOST }}"
          REMOTE_USER="${{ secrets.ROCKY_LINUX_USER }}"
          REMOTE_PASS="${{ secrets.ROCKY_LINUX_PASSWORD }}"
          REPO_URL="https://github.com/${{ github.repository }}.git"
          BRANCH="${{ github.ref_name }}"
          WORK_DIR="~/share-things-test"
          
          # Function to run a command on the remote machine
          run_remote_command() {
              local command="$1"
              echo -e "${BLUE}Running command on remote machine: ${command}${NC}"
              sshpass -p "${REMOTE_PASS}" ssh -o StrictHostKeyChecking=no "${REMOTE_USER}@${REMOTE_HOST}" "${command}"
              local exit_code=$?
              if [ $exit_code -ne 0 ]; then
                  echo -e "${RED}Command failed with exit code ${exit_code}${NC}"
                  return $exit_code
              fi
              return 0
          }
          
          # Main script
          echo -e "${BLUE}=== ShareThings Rocky Linux Testing Wrapper ===${NC}"
          echo "This script will connect to a Rocky Linux machine and run the test scripts."
          echo "Remote host: ${REMOTE_HOST}"
          echo "Remote user: ${REMOTE_USER}"
          echo "Repository: ${REPO_URL}"
          echo "Branch: ${BRANCH}"
          echo "Working directory: ${WORK_DIR}"
          echo ""
          
          # Clean up any existing containers on the remote machine
          echo -e "${YELLOW}Cleaning up any existing containers on the remote machine...${NC}"
          run_remote_command "podman ps -a --format '{{.ID}}' | xargs -r podman rm -f"
          run_remote_command "podman volume ls --format '{{.Name}}' | xargs -r podman volume rm -f"
          run_remote_command "podman network ls --format '{{.Name}}' | grep -v 'podman' | xargs -r podman network rm"
          
          # Create working directory if it doesn't exist
          echo -e "${YELLOW}Creating working directory...${NC}"
          run_remote_command "mkdir -p ${WORK_DIR}"
          
          # Clone or update the repository
          echo -e "${YELLOW}Cloning or updating repository...${NC}"
          if run_remote_command "[ -d ${WORK_DIR}/.git ]"; then
              echo -e "${GREEN}Repository already exists. Updating...${NC}"
              run_remote_command "cd ${WORK_DIR} && git checkout -- . && git fetch && git checkout ${BRANCH} && git pull"
          else
              echo -e "${GREEN}Cloning repository...${NC}"
              run_remote_command "git clone -b ${BRANCH} ${REPO_URL} ${WORK_DIR}"
          fi
          
          # Make scripts executable
          echo -e "${YELLOW}Making scripts executable...${NC}"
          run_remote_command "cd ${WORK_DIR} && chmod +x setup.sh update-server.sh ci/rocky-linux/*.sh"
          
          # Run the setup test script
          echo -e "${YELLOW}Running the setup test script...${NC}"
          run_remote_command "cd ${WORK_DIR} && ./ci/rocky-linux/test-setup.sh ${BRANCH} ${WORK_DIR}"
          if [ $? -ne 0 ]; then
              echo -e "${RED}Setup test failed.${NC}"
              exit 1
          fi
          
          # Run the update test script
          echo -e "${YELLOW}Running the update test script...${NC}"
          run_remote_command "cd ${WORK_DIR} && ./ci/rocky-linux/test-update.sh ${BRANCH} ${WORK_DIR} 8080"
          if [ $? -ne 0 ]; then
              echo -e "${RED}Update test failed.${NC}"
              exit 1
          fi
          
          echo -e "${GREEN}All tests completed successfully!${NC}"
          echo "The ShareThings application has been tested on a Rocky Linux machine."
          
          exit 0
          EOL
          
          chmod +x rocky-linux-wrapper.sh
      
      - name: Run tests on Rocky Linux
        run: ./rocky-linux-wrapper.sh