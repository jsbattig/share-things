# Test configuration for ShareThings Docker Compose

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.test
    container_name: share-things-backend-test
    hostname: backend
    environment:
      - NODE_ENV=test
      # Session storage configuration
      - SESSION_STORAGE_TYPE=${SESSION_STORAGE_TYPE:-postgresql}
      # PostgreSQL configuration for testing
      - PG_HOST=postgres-test
      - PG_PORT=5432
      - PG_DATABASE=sharethings_test
      - PG_USER=postgres_test
      - PG_PASSWORD=postgres_test
      - PG_SSL=false
      # Enable integration tests
      - INTEGRATION_TESTS=true
    ports:
      - "${BACKEND_PORT}:3001"
    depends_on:
      - postgres-test
    networks:
      app_network:
        aliases:
          - backend

  # Use a simple Node.js container for the frontend instead of a multi-stage build
  frontend:
    image: docker.io/library/node:18-alpine
    container_name: share-things-frontend-test
    hostname: frontend
    working_dir: /app
    volumes:
      - ./client:/app
    environment:
      - VITE_API_URL=http://backend:3001
      - VITE_SOCKET_URL=http://backend:3001
      - VITE_ENABLE_ANALYTICS=false
      - VITE_ENABLE_LOGGING=true
    ports:
      - "${FRONTEND_PORT}:3000"
    depends_on:
      - backend
    networks:
      app_network:
        aliases:
          - frontend
    command: sh -c "npm install && npm run preview -- --host 0.0.0.0 --port 3000"

  postgres-test:
    image: docker.io/library/postgres:14-alpine
    container_name: share-things-postgres-test
    environment:
      - POSTGRES_USER=postgres_test
      - POSTGRES_PASSWORD=postgres_test
      - POSTGRES_DB=sharethings_test
    networks:
      app_network:
        aliases:
          - postgres-test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  e2e-tests:
    build:
      context: ./test/e2e/browser
      dockerfile: Dockerfile.test
    container_name: share-things-e2e-tests
    depends_on:
      - frontend
      - backend
    environment:
      - FRONTEND_URL=http://frontend:3000
      - BACKEND_URL=http://backend:3001
    volumes:
      - ./test:/app/test
      - ./test-results:/app/test-results
    networks:
      - app_network

# Explicit network configuration
networks:
  app_network:
    driver: bridge
